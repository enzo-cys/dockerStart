version: '3.9'

services:
  database:
    image: mysql:8.0
    container_name: mysql_container
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: projetdb
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      app-network:
        aliases:
          - mysql_container

  backend:
    build:
      context: ./backend
    container_name: backend_container
    restart: unless-stopped
    environment:
      DB_HOST: database
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: projetdb
    depends_on:
      - database
    ports:
      - "3000:3000"
    networks:
      app-network:
        aliases:
          - backend_container

  nginx:
    image: nginx:alpine
    container_name: nginx_container
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network

  adminer:
    image: adminer:latest
    container_name: adminer_container
    restart: unless-stopped
    depends_on:
      - database
    ports:
      - "8081:8080"
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
